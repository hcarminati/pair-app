name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]
    branches: [develop]

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: git diff origin/${{ github.base_ref }}...HEAD > pr.diff

